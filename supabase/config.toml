# Supabase local development config
# Run: supabase start

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["exp://localhost:8081", "ono://"]
jwt_expiry = 86400
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = false
# Custom SMS hook wired to auth-sms-hook Edge Function
# Set in Supabase Dashboard → Auth → Hooks → Send SMS Hook

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_CLIENT_SECRET)"
